<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Feedback</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url('erp.jpg') no-repeat center center/cover;
    background-size: cover;
    background-size:600% 600%;
    animation:bgMove 10s infinite alternate;
}

/* Background animation */
@keyframes bgMove{
    0%{background-position:left;}
    100%{background-position:right;}
}

/* Glass Card */
.container{
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.15);
    padding:30px;
    border-radius:20px;
    width:340px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    color:white;
    animation:fadeIn 1s ease;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

/* Floating input */
.field{
    position:relative;
    margin-bottom:18px;
}

.field input,
.field textarea{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
}

.field label{
    position:absolute;
    top:12px;
    left:12px;
    color:#555;
    font-size:14px;
    transition:0.3s;
    pointer-events:none;
}

.field input:focus + label,
.field input:valid + label,
.field textarea:focus + label,
.field textarea:valid + label{
    top:-8px;
    left:8px;
    font-size:12px;
    color:white;
}

/* Stars */
.stars{
    text-align:center;
    margin-bottom:15px;
}

.stars span{
    font-size:26px;
    cursor:pointer;
    opacity:0.5;
}

.stars span.active{
    color:gold;
    opacity:1;
}

/* Button */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:white;
    color:#764ba2;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* Loader */
.loader{
    display:none;
    text-align:center;
    margin-top:10px;
}

.loader div{
    width:8px;
    height:8px;
    background:white;
    display:inline-block;
    margin:3px;
    border-radius:50%;
    animation:bounce 0.6s infinite alternate;
}

.loader div:nth-child(2){animation-delay:0.2s;}
.loader div:nth-child(3){animation-delay:0.4s;}

@keyframes bounce{
    to{transform:translateY(-8px);}
}

/* Success */
.success{
    text-align:center;
    margin-top:10px;
    display:none;
    animation:pop 0.5s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(0.9);}
    to{opacity:1; transform:scale(1);}
}

@keyframes pop{
    from{transform:scale(0.5);}
    to{transform:scale(1);}
}
</style>

</head>

<body>

<div class="container">
    <h2>💬 Feedback</h2>

    <form id="feedbackForm">

        <div class="field">
            <input type="text" id="name" required>
            <label>Your Name</label>
        </div>

        <div class="field">
            <input type="email" id="email" required>
            <label>Your Email</label>
        </div>

        <div class="field">
            <textarea id="message" required></textarea>
            <label>Your Feedback</label>
        </div>

        <!-- STAR RATING -->
        <div class="stars" id="stars">
            <span onclick="rate(1)">★</span>
            <span onclick="rate(2)">★</span>
            <span onclick="rate(3)">★</span>
            <span onclick="rate(4)">★</span>
            <span onclick="rate(5)">★</span>
        </div>

        <button type="submit">Submit</button>

        <div class="loader" id="loader">
            <div></div><div></div><div></div>
        </div>

        <div class="success" id="successMsg"></div>

    </form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-eZJ7ZBbvsnCZ3lusLO8K1KPpp40C87I",
  authDomain: "webathon-bdef1.firebaseapp.com",
  projectId: "webathon-bdef1",
  storageBucket: "webathon-bdef1.firebasestorage.app",
  messagingSenderId: "932072637633",
  appId: "1:932072637633:web:a83dc2e2e32012cf070040"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let rating = 0;

window.rate = function(val){
    rating = val;
    document.querySelectorAll("#stars span").forEach((s,i)=>{
        s.classList.toggle("active", i < val);
    });
};

document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = nameInput.value;
    const email = emailInput.value;
    const message = messageInput.value;

    if(rating === 0){
        alert("Please select rating");
        return;
    }

    loader.style.display = "block";

    try {
        await addDoc(collection(db, "feedback"), {
            name,
            email,
            message,
            rating,
            timestamp: new Date()
        });

        loader.style.display = "none";
        successMsg.innerText = "🎉 Feedback submitted!";
        successMsg.style.display = "block";
        successMsg.style.color = "lightgreen";

        feedbackForm.reset();
        rating = 0;
        rate(0);

    } catch (error) {
        loader.style.display = "none";
        successMsg.innerText = "❌ Error submitting";
        successMsg.style.display = "block";
        successMsg.style.color = "red";
    }
});
</script>

</body>
</html>
