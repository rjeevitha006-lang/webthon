<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Patient Care</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* Background */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, #a1c4fd, #c2e9fb, #d4fc79);
  background-size: 300% 300%;
  animation: move 20s ease infinite;
  z-index: -1;
}

@keyframes move {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Navbar */
nav {
  display: flex;
  justify-content: space-between;
  background: #2c3e50;
  color: white;
  padding: 15px;
}

nav ul {
  display: flex;
  list-style: none;
  gap: 20px;
}

nav li {
  cursor: pointer;
}

nav li:hover {
  color: #1abc9c;
}

/* Sections */
.section {
  display: none;
  padding: 30px;
}

.active {
  display: block;
}

/* Search */
#search {
  padding: 10px;
  width: 250px;
  border-radius: 8px;
  border: none;
  margin-bottom: 20px;
}

/* Cards */
.card {
  background: white;
  padding: 15px;
  margin: 15px 0;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Status */
.status {
  padding: 5px 10px;
  border-radius: 20px;
  color: white;
  font-size: 12px;
}

.green { background: green; }
.yellow { background: orange; }
.red { background: red; }

/* Follow */
.follow {
  border-left: 6px solid purple;
}
</style>

</head>

<body>

<div class="bg"></div>

<nav>
  <h2>🦷 Patient Care</h2>
  <ul>
    <li onclick="show('patients')">Patients</li>
    <li onclick="show('follow')">Follow Up</li>
  </ul>
</nav>

<!-- PATIENTS -->
<div id="patients" class="section active">
  <h2>Patients</h2>

  <input type="text" id="search" placeholder="Search patient..." onkeyup="searchPatient()">

  <div class="card">
    <h3>Ramesh</h3>
    <p>Disease: Tooth Pain</p>
    <p>Address: Bangalore</p>
    <span class="status green">Active</span>
  </div>

  <div class="card">
    <h3>Sita</h3>
    <p>Disease: Gum Infection</p>
    <p>Address: Chennai</p>
    <span class="status yellow">Under Treatment</span>
  </div>

  <div class="card">
    <h3>Arjun</h3>
    <p>Disease: Root Canal</p>
    <p>Address: Mysore</p>
    <span class="status red">Critical</span>
  </div>

</div>

<!-- FOLLOW UP -->
<div id="follow" class="section">
  <h2>Follow Up</h2>

  <div class="card follow">
    <h3>Ramesh</h3>
    <p>📅 Tomorrow - 10 AM</p>
  </div>

  <div class="card follow">
    <h3>Sita</h3>
    <p>📅 Next Monday</p>
  </div>

</div>

<script>
function show(id) {
  document.querySelectorAll(".section").forEach(sec => {
    sec.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

function searchPatient() {
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.querySelectorAll("#patients .card");

  cards.forEach(card => {
    let text = card.innerText.toLowerCase();
    card.style.display = text.includes(input) ? "block" : "none";
  });
}
</script>

</body>
</html>
