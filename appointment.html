<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appointment Booking</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: url("erp.jpg") no-repeat center center fixed;
    background-size: cover;
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    background: white;
    padding: 35px;
    width: 350px;
    border-radius: 15px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    animation: slideUp 1s ease;
}

/* ANIMATION */
@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(60px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.card h2 {
    text-align: center;
}

/* INPUT */
.input-box {
    position: relative;
    margin: 20px 0;
}

.input-box input,
.input-box select {
    width: 100%;
    padding: 10px;
    border: none;
    border-bottom: 2px solid #ccc;
    outline: none;
}

/* LABEL */
.input-box label {
    position: absolute;
    top: 10px;
    left: 0;
    color: gray;
    transition: 0.3s;
}

/* FLOAT EFFECT */
.input-box input:focus + label,
.input-box input:valid + label,
.input-box select:focus + label,
.input-box select:valid + label {
    top: -10px;
    font-size: 12px;
    color: #c89b3c;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(45deg, #c89b3c, #a67c2a);
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* POPUP */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: white;
    padding: 25px;
    border-radius: 10px;
    text-align: center;
    animation: zoom 0.5s ease;
}

@keyframes zoom {
    from {transform: scale(0);}
    to {transform: scale(1);}
}

.popup button {
    margin-top: 10px;
    background: #c89b3c;
}

</style>
</head>

<body>

<div class="container">
    <div class="card">

        <h2>Book Appointment</h2>

        <form onsubmit="openPopup(event)">

            <div class="input-box">
                <input type="text" required>
                <label>Full Name</label>
            </div>

            <div class="input-box">
                <input type="tel" required>
                <label>Phone Number</label>
            </div>

            <div class="input-box">
                <input type="date" required>
                <label></label>
            </div>

            <div class="input-box">
                <select required>
                    <option value=""></option>
                    <option>General Dentistry</option>
                    <option>Orthodontics</option>
                    <option>Oral Surgery</option>
                </select>
                <label>Department</label>
            </div>

            <div class="input-box">
                <select required>
                    <option value=""></option>
                    <option>10:00 AM</option>
                    <option>11:00 AM</option>
                    <option>12:00 PM</option>
                </select>
                <label>Time Slot</label>
            </div>

            <button type="submit">Book Now</button>

        </form>

    </div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-content">
        <h3>✅ Appointment Booked!</h3>
        <p>We will contact you soon.</p>
        <button onclick="closePopup()">OK</button>
    </div>
</div>

<script>
function openPopup(e){
    e.preventDefault();
    document.getElementById("popup").style.display = "flex";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
