<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
}

/* BACKGROUND IMAGE */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('erp.jpg') no-repeat center/cover;
    filter: blur(5px) brightness(0.7);
    z-index: -1;
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* GLASS CARD */
.card {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 20px;
    width: 350px;
    color: white;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    transform-style: preserve-3d;
    transition: 0.3s;
}

/* 3D HOVER */
.card:hover {
    transform: rotateY(10deg) rotateX(5deg);
}

/* TITLE */
.card h2 {
    text-align: center;
}

/* INPUT GROUP */
.input-box {
    position: relative;
    margin: 20px 0;
}

.input-box input,
.input-box textarea {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.2);
    color: white;
    outline: none;
}

.input-box label {
    position: absolute;
    left: 10px;
    top: 12px;
    color: #ddd;
    transition: 0.3s;
}

/* FLOAT EFFECT */
.input-box input:focus + label,
.input-box input:valid + label,
.input-box textarea:focus + label,
.input-box textarea:valid + label {
    top: -10px;
    font-size: 12px;
    color: #c89b3c;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #c89b3c, #a67c2a);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #c89b3c;
}

/* FLOAT BUTTONS */
.floating-btn {
    position: fixed;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.whatsapp {
    bottom: 80px;
}

.call {
    bottom: 20px;
}

.floating-btn a {
    padding: 12px;
    border-radius: 50%;
    color: white;
    font-size: 20px;
    text-align: center;
}

.whatsapp a {
    background: #25D366;
}

.call a {
    background: #007BFF;
}

/* MAP */
.map {
    width: 100%;
    height: 300px;
    margin-top: 20px;
}

/* POPUP */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: white;
    padding: 20px;
    border-radius: 10px;
}

/* SHOW POPUP */
.popup.active {
    display: flex;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h2>Contact Us</h2>

        <form>
            <div class="input-box">
                <input type="text" required>
                <label>Name</label>
            </div>

            <div class="input-box">
                <input type="email" required>
                <label>Email</label>
            </div>

            <div class="input-box">
                <textarea rows="3" required></textarea>
                <label>Message</label>
            </div>

            <button type="button" onclick="openPopup()">Send Message</button>
        </form>
    </div>
</div>

<!-- MAP -->
<iframe class="map"
src="https://maps.google.com/maps?q=Bangalore&t=&z=13&ie=UTF8&iwloc=&output=embed">
</iframe>

<!-- FLOAT BUTTONS -->
<div class="floating-btn whatsapp">
    <a href="https://wa.me/9900627702">💬</a>
</div>

<div class="floating-btn call">
    <a href="tel:+919900627702">📞</a>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-content">
        <h3>Message Sent Successfully!</h3>
        <button onclick="closePopup()">OK</button>
    </div>
</div>

<script>
function openPopup() {
    document.getElementById("popup").classList.add("active");
}

function closePopup() {
    document.getElementById("popup").classList.remove("active");
}
</script>

</body>
</html>
